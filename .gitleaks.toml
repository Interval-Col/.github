# ─────────────────────────────────────────────────────────────────────
# Canonical gitleaks config for Interval-Col.
#
# The org's single source of truth for "what counts as a leak." Every
# repo's secret-scan (.github/workflows/gitleaks.yml) runs
# `gitleaks detect`, which auto-discovers a .gitleaks.toml at the repo
# root. Repos either:
#   - copy this file in (docs/meta repos: .github, operations), or
#   - keep it in sync (code repos) — when you change a rule or an
#     allowlist entry here, propagate it.
#
# Keep the gitleaks VERSION in lockstep with each repo's pinned binary
# in gitleaks.yml (currently v8.21.2) and the pre-commit hook rev.
#
# Policy: BRANCHING-AND-DEPLOY.md → "Hooks".
# ─────────────────────────────────────────────────────────────────────

title = "Interval-Col gitleaks config"

[extend]
# Start from gitleaks' maintained built-in ruleset (cloud keys, private
# keys, generic high-entropy tokens, etc.) and layer org tweaks on top.
# We do NOT replace it — the default set is the baseline.
useDefault = true

# ─────────────────────────────────────────────────────────────────────
# Allowlist — false positives and known-safe placeholders ONLY.
#
# RULE OF THUMB: a real secret that leaked gets ROTATED (see operations
# SECURITY.md → incident response), NOT allowlisted. Allowlist only
# example/placeholder values and paths that are example-by-design. Every
# entry should be obvious-why — add a comment.
# ─────────────────────────────────────────────────────────────────────
[allowlist]
description = "Org-wide false-positive allowlist"

paths = [
  # Example env files carry placeholder values by design.
  '''(.*?)\.env\.example$''',
  '''(.*?)\.env\.sample$''',
  # Lockfiles: long integrity hashes trip entropy rules; not secrets.
  '''(.*?)(package-lock\.json|pnpm-lock\.yaml|poetry\.lock|uv\.lock)$''',
  # Mock-IAM dev tool: seeds dev-only stub tokens by design (the file's
  # own comments say "Dev-only; rotate freely"). Used across repos that
  # bridge to the local SSO mock (finance-lch, admission-patient, …).
  '''(^|.*/)mock-iam/''',
  # Brand logo SVGs embed the mark's raster PNG as a base64 data URI (a
  # stopgap until true vector exports exist — LCH-BRAND.md §4.2). The blob
  # is high-entropy image data, not a secret (same rationale as lockfiles).
  '''(^|.*/)brands/.*/logos/.*\.svg$''',
]

regexes = [
  # Obvious placeholder tokens used in docs and examples.
  '''(?i)(your[-_ ]?(api[-_ ]?)?key[-_ ]?here|changeme|placeholder|example[-_ ]?secret|dummy[-_ ]?token)''',
  # `dev-admin` — the documented local SSO-mock placeholder token used in
  # curl examples and localStorage across repos (sso-mock-dev pattern).
  # Matches the bare token (the curl-auth-header rule captures just the
  # value), so `\bdev-admin\b` rather than `Bearer dev-admin`.
  '''\bdev-admin\b''',
]
