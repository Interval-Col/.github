<svg xmlns="http://www.w3.org/2000/svg" width="380" height="120" viewBox="0 0 380 120">
  <title>Pháros — Control de Calidad</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400&display=swap');
    .name { font-family: 'Fraunces', 'Times New Roman', serif; font-size: 64px; font-weight: 400; fill: #782F40; letter-spacing: -0.01em; }
    .sub { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 9px; font-weight: 400; fill: #888B8D; letter-spacing: 0.32em; }
  </style>
  <!-- Pilot light dot above the P -->
