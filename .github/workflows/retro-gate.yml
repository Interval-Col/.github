name: PhĂˇros â€” retro-gate
# Enforces the Retro Gate handoff (plans/pharos-fe-spec-rollout-v2.md â†’ Â§Retro Gate).
# Runs on EVERY PR (so it's safe as a required check) but only VERIFIES `retro-gate`-labeled PRs.
# On a `retro-gate` PR it fails unless the PR (a) lands a track retro doc AND (b) back-propagates
# into the rollout plan â€” or explicitly declares `Back-propagation: NONE`.
# v1: file-level + non-empty-diff enforcement. TODO(refine): assert the change lands inside the
# specific downstream `## Track <X>` section, not just anywhere in the plan file.
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches: [main]

permissions:
  contents: read

jobs:
  retro-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify retro doc + back-propagation
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # SAFE-TO-REQUIRE: this job always runs + reports, so it can be a required check on
          # EVERY PR. Only `retro-gate`-labeled PRs get the real verification; any other PR
          # passes through immediately (a required check that is *skipped* would block all PRs).
          case ",${LABELS}," in
            *,retro-gate,*) : ;;
            *) echo "Not a retro-gate PR â€” passing through (required check always reports green)."; exit 0 ;;
          esac

          CHANGED="$(git diff --name-only "$BASE...$HEAD")"
          echo "Changed files:"; echo "$CHANGED"

          # (a) a track retro doc must be added/changed
          RETRO="$(echo "$CHANGED" | grep -E '^plans/pharos-track-retro\.[ABC]\.md$' || true)"
          if [ -z "$RETRO" ]; then
            echo "::error::Retro Gate: no plans/pharos-track-retro.<A|B|C>.md in the diff. The retro doc is mandatory."
            exit 1
          fi
          echo "Retro doc: $RETRO"

          # (b) back-propagation: the rollout plan must be edited, OR the retro declares NONE explicitly
          PLAN_EDITED="$(echo "$CHANGED" | grep -E '^plans/pharos-fe-spec-rollout-v2\.md$' || true)"
          NONE_DECLARED="$(grep -E '^> Back-propagation: NONE â€”' "$RETRO" || true)"

          if [ -n "$PLAN_EDITED" ]; then
            # guard against a whitespace-only (silent no-op) plan edit
            ADDED="$(git diff "$BASE...$HEAD" -- plans/pharos-fe-spec-rollout-v2.md \
              | grep -E '^\+[^+]' | grep -vcE '^\+[[:space:]]*$' || true)"
            if [ "${ADDED:-0}" -gt 0 ]; then
              echo "Retro Gate: passed â€” rollout plan back-propagated ($ADDED added lines)."
              exit 0
            fi
          fi

          if [ -n "$NONE_DECLARED" ]; then
            echo "Retro Gate: passed â€” explicit Back-propagation: NONE declared in $RETRO."
            exit 0
          fi

          echo "::error::Retro Gate: no back-propagation. Edit the downstream track section(s) of plans/pharos-fe-spec-rollout-v2.md, or add '> Back-propagation: NONE â€” <why>' per downstream track in the retro doc."
          exit 1
