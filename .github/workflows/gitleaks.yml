# Secret-scan gate — the load-bearing check for this repo.
#
# .github is docs-only (org meta-repo), so it has no lint/test/build
# jobs to gate merges on. The one thing that MUST never land here is a
# credential, key, or other secret. gitleaks is therefore the single
# required status check wired into branch protection on `main`
# (BRANCHING-AND-DEPLOY.md → "Hooks").
#
# `gitleaks detect` auto-discovers the repo-root .gitleaks.toml (this
# repo hosts the canonical org config), so local pre-commit and this CI
# run agree on what counts as a leak. Same gitleaks version (8.21.2) as
# the pre-commit hook.
#
# We run the pinned gitleaks BINARY rather than gitleaks-action@v2,
# which requires a GITLEAKS_LICENSE secret for organization-owned repos.
# The binary has no such gate.
#
# The job is named `gitleaks` so the required status-check context is
# exactly `gitleaks`.

name: gitleaks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so `gitleaks detect` scans every commit, not
          # just the tip.
          fetch-depth: 0

      - name: Run gitleaks
        run: |
          set -euo pipefail
          VERSION=8.21.2
          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          # --redact: never print the matched secret into the public log.
          # --exit-code 1: fail the check (and thus the PR) on any finding.
          # .gitleaks.toml at the repo root is auto-loaded.
          ./gitleaks detect --source . --redact --no-banner --exit-code 1
