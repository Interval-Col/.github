# Reusable: Pháros auth contract conformance gate — RFC 0016 Phase 1.
#
# Runs scripts/auth-contract-check.py (from this repo, @main) against the caller
# repo's .auth-contract.yml manifest and asserts the mechanical subset of
# auth-contract.md: the 7 /auth/admin/* endpoints, require_capability's
# unknown-id guard, no seeding on app startup, FE↔BE capability sync, schema
# widths, the role registry, and require_role shims. Details in the contract doc.
#
# Rollout (RFC 0016 Phase 1): unlike db-tenant-check, the three auth modules
# start non-conformant by construction (that IS the drift RFC 0016 pays down), so
# callers adopt with enforce=false — drift annotates and never blocks. Each app
# converges under its issue (finance-lch#101 epic) and flips enforce=true once
# its first run is green. New greenfield adopters comply from day one.
#
# Why self-hosted: the org is on the Team plan with a $0 Actions spending limit —
# a github-hosted required check risks tipping the cap and killing all runs.
# Tenant repos are private, so the self-hosted pool applies.
#
# No secrets needed: the check is pure static analysis of the caller repo.

name: auth-contract-check

on:
  workflow_call:
    inputs:
      runner:
        description: JSON array of runner labels
        type: string
        required: false
        default: '["self-hosted"]'
      enforce:
        description: fail the check on contract drift (required-check mode)
        type: boolean
        required: false
        default: false
      manifest:
        description: path to the .auth-contract.yml manifest, repo-root-relative
        type: string
        required: false
        default: .auth-contract.yml

permissions:
  contents: read

jobs:
  auth-contract-check:
    runs-on: ${{ fromJSON(inputs.runner) }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: Interval-Col/.github
          ref: main
          path: .auth-contract-org
      - name: auth-contract-check
        env:
          MANIFEST: ${{ inputs.manifest }}
          ENFORCE: ${{ inputs.enforce }}
        run: |
          set -euo pipefail
          args=(--manifest "$MANIFEST")
          if [ "$ENFORCE" = "true" ]; then args+=(--enforce); fi
          python3 .auth-contract-org/scripts/auth-contract-check.py "${args[@]}"
